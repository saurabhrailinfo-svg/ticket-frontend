<!DOCTYPE html>
<html>
<head>
<title>IRCTC PRO SYSTEM</title>

<style>
body { background:#0b1220; color:white; font-family:Arial; }
.container { width:900px; margin:30px auto; background:#111827; padding:20px; border-radius:10px; }
input,select,button { width:100%; padding:10px; margin:5px 0; background:#1f2937; color:white; border:none; border-radius:5px; }
button { background:#00ffff; font-weight:bold; cursor:pointer; }
button:hover { background:#00cccc; }
.box { border:1px solid #00ffff30; padding:10px; margin-bottom:10px; }
.train { background:#1f2937; padding:10px; margin:5px 0; border-radius:5px; }
.row { display:flex; gap:10px; }
</style>

</head>

<body>

<div class="container">

<h2>🚄 IRCTC PRO SYSTEM</h2>

<!-- 🔍 TRAIN SEARCH -->
<div class="box">
<h3>Search Train</h3>
<input id="from" placeholder="From (NDLS)">
<input id="to" placeholder="To (BCT)">
<button onclick="searchTrain()">Search Train</button>
</div>

<div id="trains"></div>

<!-- 🎫 BOOKING -->
<div class="box">
<h3>Booking Details</h3>

<input id="mobile" placeholder="Mobile Number">
<input id="date" placeholder="Journey Date">

<!-- PASSENGERS -->
<h4>Passenger 1</h4>
<div class="row">
<input id="name1" placeholder="Name">
<input id="age1" placeholder="Age">
<select id="gender1">
<option>Male</option>
<option>Female</option>
</select>
</div>

<h4>Passenger 2</h4>
<div class="row">
<input id="name2" placeholder="Name">
<input id="age2" placeholder="Age">
<select id="gender2">
<option>Male</option>
<option>Female</option>
</select>
</div>

<h4>Passenger 3</h4>
<div class="row">
<input id="name3" placeholder="Name">
<input id="age3" placeholder="Age">
<select id="gender3">
<option>Male</option>
<option>Female</option>
</select>
</div>

<h4>Passenger 4</h4>
<div class="row">
<input id="name4" placeholder="Name">
<input id="age4" placeholder="Age">
<select id="gender4">
<option>Male</option>
<option>Female</option>
</select>
</div>

<button onclick="book()">BOOK TICKET</button>

</div>

<p id="msg"></p>

</div>

<script>

// 🔍 TRAIN SEARCH
async function searchTrain(){
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  document.getElementById("trains").innerHTML = "Loading...";

  try{
    let res = await fetch("https://indian-railway-api.cyclic.app/trains?from="+from+"&to="+to);
    let data = await res.json();

    let html = "";

    if(data.data && data.data.length > 0){
      data.data.forEach(t => {
        html += `
          <div class="train">
            🚄 ${t.name} (${t.train_number})<br>
            ${t.from} ➜ ${t.to}
          </div>
        `;
      });
    } else {
      html = "❌ No Train Found";
    }

    document.getElementById("trains").innerHTML = html;

  }catch(e){
    document.getElementById("trains").innerHTML = "Error loading trains";
  }
}

// 🎫 BOOK FUNCTION
async function book(){

  const data = {
    mobile: mobile.value,
    from: from.value,
    to: to.value,
    date: date.value,

    passengers: [
      {name: name1.value, age: age1.value, gender: gender1.value},
      {name: name2.value, age: age2.value, gender: gender2.value},
      {name: name3.value, age: age3.value, gender: gender3.value},
      {name: name4.value, age: age4.value, gender: gender4.value}
    ]
  };

  await fetch("https://ticket-system-production-bfea.up.railway.app/save", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  document.getElementById("msg").innerText = "✅ Ticket Booked Successfully";
}

</script>

</body>
</html>
